<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <!-- Talwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome Cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        .active-tab { border-bottom: 3px solid #4F46E5; color: #4F46E5; }
    </style>
</head>
    <body class="bg-gray-50 min-h-screen font-sans text-gray-800">

    <div id="login-page" class="flex items-center justify-center min-h-screen bg-gray-100">
        <div class="card w-96 bg-white shadow-2xl p-8 border border-gray-200">
            <div class="text-center mb-6">
                <div class="bg-primary text-white w-12 h-12 rounded-lg flex items-center justify-center mx-auto mb-4 text-2xl font-bold">G</div>
                <h2 class="text-2xl font-bold">Sign In</h2>
                <p class="text-sm text-gray-500">Demo: admin / admin123</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="username" placeholder="Username" class="input input-bordered w-full bg-gray-50" />
                <input type="password" id="password" placeholder="Password" class="input input-bordered w-full bg-gray-50" />
                <button onclick="handleLogin()" class="btn btn-primary w-full text-white">Sign In</button>
            </div>
        </div>
    </div>
    </body>
</html>
