<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker | Assignment-5</title>
    <!-- Talwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Talwind CSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.css" rel="stylesheet" type="text/css" />
    <style>
        .active-tab { border-bottom: 3px solid #4F46E5; color: #4F46E5; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800">
    <!-- LogIn Page -->
    <div id="login-page" class="flex items-center justify-center min-h-screen bg-gray-100">
        <div class="card w-96 bg-white shadow-2xl p-8 border border-gray-200">
            <div class="text-center mb-6">
                <div class="bg-primary text-white w-12 h-12 rounded-lg flex items-center justify-center mx-auto mb-4 text-2xl font-bold">G</div>
                <h2 class="text-2xl font-bold">Sign In</h2>
                <p class="text-sm text-gray-500">Demo: admin / admin123</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="username" placeholder="Username" class="input input-bordered w-full bg-gray-50" />
                <input type="password" id="password" placeholder="Password" class="input input-bordered w-full bg-gray-50" />
                <button onclick="handleLogin()" class="btn btn-primary w-full text-white">Sign In</button>
            </div>
        </div>
    </div>
    <!-- Main Content -->
    <div id="main-content" class="hidden">
        <!-- Navbar -->
        <nav class="navbar bg-white border-b px-4 lg:px-12 sticky top-0 z-50">
            <div class="flex-1">
                <a class="text-xl font-black text-primary tracking-tighter">GITHUB ISSUES</a>
            </div>
            <div class="flex-none gap-3">
                <div class="join">
                    <input type="text" id="search-input" placeholder="Search by title..." class="input input-bordered join-item w-32 md:w-64" />
                    <button onclick="handleSearch()" class="btn btn-primary join-item">Search</button>
                </div>
            </div>
        </nav>

            <!-- All Issue -->
        <div class="max-w-7xl mx-auto py-10 px-4 lg:px-8">
            <div class="flex gap-8 border-b border-gray-200 mb-8 overflow-x-auto">
                <button id="btn-all" onclick="filterData('all', this)" class="pb-3 font-semibold transition-all active-tab">All Issues</button>
                <button id="btn-open" onclick="filterData('open', this)" class="pb-3 font-semibold text-gray-500 hover:text-primary transition-all">Open</button>
                <button id="btn-closed" onclick="filterData('closed', this)" class="pb-3 font-semibold text-gray-500 hover:text-primary transition-all">Closed</button>
            </div>

            <!-- Total Issues -->
            <div class="flex justify-between items-center mb-6 bg-white p-4 rounded-lg border shadow-sm">
                <div class="flex items-center gap-2">
                    <span class="text-lg">📋</span>
                    <span class="font-bold">Total Issues:</span>
                    <span id="issue-count" class="badge badge-primary font-mono">0</span>
                </div>
                <div class="hidden md:flex gap-6 text-xs font-bold uppercase tracking-wider">
                    <span class="text-green-600 flex items-center gap-1">● OPEN (GREEN BORDER)</span>
                    <span class="text-purple-600 flex items-center gap-1">● CLOSED (PURPLE BORDER)</span>
                </div>
            </div>

            <div id="loading" class="hidden flex justify-center py-20">
                <span class="loading loading-spinner loading-lg text-primary"></span>
            </div>

            <div id="issues-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                </div>
        </div>
    </div>

   
    <script src="script.js"></script>
</body>
</html>
