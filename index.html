<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker | Assignment-5</title>
    <!-- Talwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Talwind CSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.css" rel="stylesheet" type="text/css" />
    <style>
        .active-tab { border-bottom: 3px solid #4F46E5; color: #4F46E5; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800">
    <!-- LogIn Page -->
    <div id="login-page" class="flex items-center justify-center min-h-screen bg-gray-100">
        <div class="card w-96 bg-white shadow-2xl p-8 border border-gray-200">
            <div class="text-center mb-6">
                <div class="bg-primary text-white w-12 h-12 rounded-lg flex items-center justify-center mx-auto mb-4 text-2xl font-bold">G</div>
                <h2 class="text-2xl font-bold">Sign In</h2>
                <p class="text-sm text-gray-500">Demo: admin / admin123</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="username" placeholder="Username" class="input input-bordered w-full bg-gray-50" />
                <input type="password" id="password" placeholder="Password" class="input input-bordered w-full bg-gray-50" />
                <button onclick="handleLogin()" class="btn btn-primary w-full text-white">Sign In</button>
            </div>
        </div>
    </div>
    <!-- Main Content -->
    <div id="main-content" class="hidden">
        <!-- Navbar -->
        <nav class="navbar bg-white border-b px-4 lg:px-12 sticky top-0 z-50">
            <div class="flex-1">
                <a class="text-xl font-black text-primary tracking-tighter">GITHUB ISSUES</a>
            </div>
            <div class="flex-none gap-3">
                <div class="join">
                    <input type="text" id="search-input" placeholder="Search by title..." class="input input-bordered join-item w-32 md:w-64" />
                    <button onclick="handleSearch()" class="btn btn-primary join-item">Search</button>
                </div>
            </div>
        </nav>

    

    <script src="script.js"></script>
</body>
</html>
